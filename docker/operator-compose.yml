version: '3.8'

services:
  operator_monitoring:
    build:
      context: .
      dockerfile: Dockerfile.operator
      args:
        # PUID/PGID can be overwritten in .env if host user is not 1000
        USER_UID: 1000
        USER_GID: 1000
    container_name: uarm_operator
    network_mode: host
    privileged: true
    volumes:
      # Map input devices for PS5 controller support
      - /dev/input:/dev/input
      # X11 mapping for RViz GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/home/ros2/.Xauthority:ro
      # Map the workspace to the container's user home
      - ../:/home/ros2/ros2_ws
    environment:
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      # Ensure standard ROS variables are passed. MUST match the Pi's Domain ID!
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    restart: unless-stopped
    stdin_open: true
    tty: true
    # Launch the operator specific launch file
    command: >
      bash -c "source /home/ros2/ros2_ws/install/setup.bash && ros2 launch uarm_brain operator_monitoring.launch.py"
